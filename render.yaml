databases:
  - name: attendance-db
    plan: free
    databaseName: attendance
    user: attendance_user

services:
  - type: web
    name: attendance-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build && npx prisma migrate deploy
    startCommand: node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
